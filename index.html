<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOI to BibTeX Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Custom animation for the spinner */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-custom {
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 font-sans selection:bg-blue-200 flex flex-col">
    <main class="max-w-2xl mx-auto p-4 sm:p-6 lg:p-8 pt-8 sm:pt-12 flex-grow w-full">
        
        <!-- Header Section -->
        <header class="text-center mb-8">
            <div class="inline-flex items-center justify-center p-3 bg-blue-100 text-blue-600 rounded-2xl mb-4">
                <i data-lucide="book-open" class="w-8 h-8" stroke-width="1.5"></i>
            </div>
            <h1 class="text-3xl font-bold tracking-tight text-slate-900 mb-2">
                DOI to BibTeX
            </h1>
            <p class="text-slate-500 text-sm sm:text-base max-w-sm mx-auto">
                Instantly convert Digital Object Identifiers into formatted BibTeX citations.
            </p>
        </header>

        <!-- Input Card -->
        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-5 sm:p-6 mb-6">
            <form id="convert-form" class="space-y-4">
                <div>
                    <label for="doi-input" class="block text-sm font-medium text-slate-700 mb-2">
                        Enter DOI or DOI Link
                    </label>
                    <input
                        id="doi-input"
                        type="text"
                        placeholder="e.g., 10.1038/nature12373"
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-base placeholder:text-slate-400"
                        autocomplete="off"
                        autocorrect="off"
                        autocapitalize="off"
                        spellcheck="false"
                    />
                </div>
                
                <button
                    id="submit-btn"
                    type="submit"
                    disabled
                    class="w-full flex items-center justify-center gap-2 py-3 px-4 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 disabled:bg-blue-300 disabled:cursor-not-allowed text-white font-medium rounded-xl transition-colors select-none touch-manipulation text-base"
                >
                    <span id="btn-text-default">Convert to BibTeX</span>
                    <div id="btn-text-loading" class="hidden flex items-center gap-2">
                        <i data-lucide="refresh-cw" class="w-5 h-5 animate-spin-custom"></i>
                        <span>Converting...</span>
                    </div>
                </button>
            </form>
        </div>

        <!-- Error Message -->
        <div id="error-container" class="hidden flex items-start gap-3 p-4 bg-red-50 text-red-700 rounded-2xl mb-6 border border-red-100 transition-opacity">
            <i data-lucide="alert-circle" class="w-5 h-5 shrink-0 mt-0.5"></i>
            <p id="error-text" class="text-sm leading-relaxed"></p>
        </div>

        <!-- Result Card -->
        <div id="result-container" class="hidden bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden transition-opacity">
            <div class="p-4 sm:p-5 border-b border-slate-100 flex flex-col sm:flex-row gap-3 sm:items-center justify-between bg-slate-50/50">
                <h2 class="font-semibold text-slate-800 text-sm">Generated BibTeX</h2>
                
                <div class="flex items-center gap-2 w-full sm:w-auto">
                    <button
                        id="copy-btn"
                        class="flex-1 sm:flex-none flex items-center justify-center gap-2 px-4 py-2 bg-white border border-slate-200 hover:bg-slate-50 active:bg-slate-100 text-slate-700 rounded-lg text-sm font-medium transition-colors touch-manipulation"
                    >
                        <div id="copy-icon-default" class="flex items-center gap-2">
                            <i data-lucide="copy" class="w-4 h-4"></i>
                            <span>Copy</span>
                        </div>
                        <div id="copy-icon-success" class="hidden flex items-center gap-2 text-green-600">
                            <i data-lucide="check" class="w-4 h-4"></i>
                            <span>Copied!</span>
                        </div>
                    </button>
                    
                    <button
                        id="download-btn"
                        class="flex-1 sm:flex-none flex items-center justify-center gap-2 px-4 py-2 bg-white border border-slate-200 hover:bg-slate-50 active:bg-slate-100 text-slate-700 rounded-lg text-sm font-medium transition-colors touch-manipulation"
                    >
                        <i data-lucide="download" class="w-4 h-4"></i>
                        <span>Download</span>
                    </button>
                </div>
            </div>
            
            <div class="p-4 sm:p-5 overflow-x-auto bg-slate-900">
                <pre class="text-sm text-blue-300 font-mono whitespace-pre-wrap break-words"><code id="bibtex-output"></code></pre>
            </div>
        </div>

    </main>

    <footer class="text-center pb-8 pt-4 text-sm text-slate-400 w-full">
        &copy; <script>document.write(new Date().getFullYear())</script> - Proudly prepared by NQMN. <a href="mailto:mohdadil@live.com" class="text-blue-500 hover:text-blue-600 hover:underline transition-colors">Contact me!</a>
    </footer>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // DOM Elements
        const form = document.getElementById('convert-form');
        const doiInput = document.getElementById('doi-input');
        const submitBtn = document.getElementById('submit-btn');
        const btnTextDefault = document.getElementById('btn-text-default');
        const btnTextLoading = document.getElementById('btn-text-loading');
        
        const errorContainer = document.getElementById('error-container');
        const errorText = document.getElementById('error-text');
        
        const resultContainer = document.getElementById('result-container');
        const bibtexOutput = document.getElementById('bibtex-output');
        const copyBtn = document.getElementById('copy-btn');
        const copyIconDefault = document.getElementById('copy-icon-default');
        const copyIconSuccess = document.getElementById('copy-icon-success');
        const downloadBtn = document.getElementById('download-btn');

        // State variables
        let currentBibtex = '';
        let currentCleanedDoi = '';

        // Utilities
        const cleanDoiInput = (input) => {
            let cleaned = input.trim();
            cleaned = cleaned.replace(/^(https?:\/\/)?(dx\.)?doi\.org\//i, '');
            cleaned = cleaned.replace(/^doi:/i, '');
            return cleaned;
        };

        const formatBibtex = (rawBibtex, originalDoi) => {
            // Parse the entry type and key
            const entryMatch = rawBibtex.match(/@([a-zA-Z]+)\s*\{\s*([^,]+),/);
            if (!entryMatch) return rawBibtex;

            const entryType = entryMatch[1];
            let citeKey = entryMatch[2].replace(/_/g, '');

            // Extract fields using regex
            const fieldRegex = /,\s*([a-zA-Z0-9_\-]+)\s*=\s*(?:\{([\s\S]*?)\}|([^{},\s]+))/g;
            let fields = {};
            let match;
            while ((match = fieldRegex.exec(rawBibtex)) !== null) {
                const key = match[1].toLowerCase();
                const val = match[2] !== undefined ? match[2] : match[3];
                fields[key] = val.trim();
            }

            // Apply Fixes
            
            // 1. Author formatting: "Last, First" -> "First Last"
            if (fields.author) {
                fields.author = fields.author.split(/\s+and\s+/).map(author => {
                    if (author.includes(',')) {
                        const parts = author.split(',').map(p => p.trim());
                        if (parts.length === 2) return `${parts[1]} ${parts[0]}`;
                    }
                    return author;
                }).join(' and ');
            }

            // 2. Title casing & double braces
            if (fields.title) {
                const smallWords = /^(a|an|and|as|at|but|by|en|for|if|in|nor|of|on|or|per|the|to|v.?|vs.?|via)$/i;
                let titleCase = fields.title.replace(/\w[^\s:\-]*/g, (txt, offset, fullStr) => {
                    if (txt.substring(1).search(/[A-Z]/) !== -1) return txt; // Preserve camelCase/Acronyms like LogLAA
                    const prev = fullStr.substring(Math.max(0, offset - 2), offset).trim();
                    const isAfterPunctuation = prev === ':' || prev === '-';
                    if (offset !== 0 && !isAfterPunctuation && smallWords.test(txt)) {
                        return txt.toLowerCase();
                    }
                    return txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase();
                });
                fields.title = titleCase; 
            }

            // 3. Page range dashes
            if (fields.pages) {
                fields.pages = fields.pages.replace(/[-–—]+/g, '--');
            }

            // 4. Handle missing pages via article identifiers
            const eLocators = ['article-number', 'eid', 'elocation-id'];
            for (const loc of eLocators) {
                if (fields[loc]) {
                    if (!fields.pages) fields.pages = fields[loc];
                    delete fields[loc]; // Clean up regardless to avoid redundancy
                }
            }

            // 5. Booktitle for proceedings
            if (entryType.toLowerCase() === 'inproceedings' && fields.booktitle) {
                if (!/^proceedings of\b/i.test(fields.booktitle)) {
                    fields.booktitle = `Proceedings of the ${fields.booktitle.replace(/^the\s+/i, '')}`;
                }
            }

            // 6. DOI and URL overrides (ensure correct canonical casing and links)
            if (originalDoi) {
                fields.doi = originalDoi;
                fields.url = `https://doi.org/${originalDoi}`;
            } else if (fields.url) {
                fields.url = fields.url.replace(/http:\/\/dx\.doi\.org\//ig, 'https://doi.org/');
            }

            // 7. Delete noisy/redundant fields (but keep url)
            delete fields.issn;
            delete fields.eissn;
            if (entryType.toLowerCase() === 'article') {
                delete fields.publisher;
            }

            // 8. Reconstruct with preferred semantic ordering (url added at the end)
            const preferredOrder = [
                'author', 'title', 'journal', 'booktitle', 'volume', 'number', 'pages', 'year', 'month', 'publisher', 'doi', 'url'
            ];

            let result = `@${entryType}{${citeKey},\n`;
            const outputFields = [];

            preferredOrder.forEach(key => {
                if (fields[key]) {
                    let val = fields[key];
                    if (key === 'title') {
                        // Ensure double braces for title to lock in capitalization
                        outputFields.push(`  ${key.padEnd(9)} = {{${val.replace(/^\{+|\}+$/g, '')}}}`);
                    } else if (key === 'month' && /^[a-z]{3}$/i.test(val)) {
                        outputFields.push(`  ${key.padEnd(9)} = ${val.toLowerCase()}`);
                    } else {
                        outputFields.push(`  ${key.padEnd(9)} = {${val}}`);
                    }
                    delete fields[key];
                }
            });

            // Append any remaining fields that weren't in the preferred order
            Object.keys(fields).forEach(key => {
                let val = fields[key];
                outputFields.push(`  ${key.padEnd(9)} = {${val}}`);
            });

            result += outputFields.join(',\n') + '\n}';
            return result;
        };

        // Event Listeners
        doiInput.addEventListener('input', (e) => {
            submitBtn.disabled = !e.target.value.trim();
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const doi = doiInput.value;
            currentCleanedDoi = cleanDoiInput(doi);
            
            if (!currentCleanedDoi) {
                showError('Please enter a valid DOI.');
                return;
            }

            setLoading(true);
            hideError();
            hideResult();

            try {
                const response = await fetch(`https://api.crossref.org/works/${encodeURIComponent(currentCleanedDoi)}/transform/application/x-bibtex`);
                
                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error('DOI not found. Please check the identifier and try again.');
                    }
                    throw new Error('Failed to fetch BibTeX data. The service might be temporarily unavailable.');
                }

                const data = await response.text();
                currentBibtex = formatBibtex(data.trim(), currentCleanedDoi);
                
                showResult(currentBibtex);
                
                setTimeout(() => {
                    resultContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }, 100);

            } catch (err) {
                showError(err.message || 'An unexpected error occurred.');
            } finally {
                setLoading(false);
            }
        });

        copyBtn.addEventListener('click', () => {
            if (!currentBibtex) return;

            const textArea = document.createElement('textarea');
            textArea.value = currentBibtex;
            textArea.style.top = '0';
            textArea.style.left = '0';
            textArea.style.position = 'fixed';
            
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showCopySuccess();
                } else {
                    throw new Error('Copy command failed');
                }
            } catch (err) {
                console.error('Fallback copy failed', err);
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(currentBibtex)
                        .then(showCopySuccess)
                        .catch(e => console.error('Clipboard API failed', e));
                }
            } finally {
                document.body.removeChild(textArea);
            }
        });

        downloadBtn.addEventListener('click', () => {
            if (!currentBibtex) return;
            
            const blob = new Blob([currentBibtex], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            
            const safeFilename = currentCleanedDoi.replace(/[^a-z0-9]/gi, '_').toLowerCase();
            
            link.href = url;
            link.download = `citation_${safeFilename || 'export'}.bib`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        });

        // UI Helpers
        function setLoading(isLoading) {
            submitBtn.disabled = isLoading || !doiInput.value.trim();
            if (isLoading) {
                btnTextDefault.classList.add('hidden');
                btnTextLoading.classList.remove('hidden');
            } else {
                btnTextDefault.classList.remove('hidden');
                btnTextLoading.classList.add('hidden');
            }
        }

        function showError(msg) {
            errorText.textContent = msg;
            errorContainer.classList.remove('hidden');
        }

        function hideError() {
            errorContainer.classList.add('hidden');
            errorText.textContent = '';
        }

        function showResult(bibtexText) {
            bibtexOutput.textContent = bibtexText;
            resultContainer.classList.remove('hidden');
        }

        function hideResult() {
            resultContainer.classList.add('hidden');
            bibtexOutput.textContent = '';
            currentBibtex = '';
        }

        function showCopySuccess() {
            copyIconDefault.classList.add('hidden');
            copyIconSuccess.classList.remove('hidden');
            
            setTimeout(() => {
                copyIconSuccess.classList.add('hidden');
                copyIconDefault.classList.remove('hidden');
            }, 2000);
        }
    </script>
</body>
</html>
